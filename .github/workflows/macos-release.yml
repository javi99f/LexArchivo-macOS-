name: Publicar macOS

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      SYNCTHING_VERSION: 2.1.1

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Activar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Comprobar TypeScript
        run: pnpm run check

      - name: Pruebas frontend
        run: pnpm test

      - name: Pruebas Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Preparar Syncthing incluido
        run: |
          mkdir -p src-tauri/resources
          curl -L "https://github.com/syncthing/syncthing/releases/download/v${SYNCTHING_VERSION}/syncthing-macos-universal-v${SYNCTHING_VERSION}.zip" -o /tmp/syncthing.zip
          unzip -q /tmp/syncthing.zip -d /tmp/syncthing
          SYNCTHING_BIN="$(find /tmp/syncthing -type f -name syncthing | head -n 1)"
          if [ -z "$SYNCTHING_BIN" ]; then
            echo "No se encontro el binario de Syncthing"
            exit 1
          fi
          cp "$SYNCTHING_BIN" src-tauri/resources/syncthing
          chmod +x src-tauri/resources/syncthing
          src-tauri/resources/syncthing --version

      - name: Construir instalador macOS
        run: pnpm exec tauri build --target universal-apple-darwin --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Crear latest.json
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const releaseUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${process.env.GITHUB_REF_NAME}`;
          const updaterDir = "src-tauri/target/universal-apple-darwin/release/bundle/macos";
          const files = fs.readdirSync(updaterDir);
          const updater = files.find((name) => name.endsWith(".app.tar.gz"));

          if (!updater) {
            throw new Error("No se encontro el paquete de actualizacion .app.tar.gz");
          }

          const sig = `${updater}.sig`;

          if (!fs.existsSync(path.join(updaterDir, sig))) {
            throw new Error("No se encontro la firma del paquete de actualizacion");
          }

          const mac = {
            signature: fs.readFileSync(path.join(updaterDir, sig), "utf8").trim(),
            url: `${releaseUrl}/${updater}`
          };

          const latest = {
            version,
            notes: `LexArchivo macOS ${version}`,
            pub_date: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
            platforms: {
              "darwin-x86_64": mac,
              "darwin-aarch64": mac
            }
          };

          fs.writeFileSync(path.join(updaterDir, "latest.json"), JSON.stringify(latest, null, 2));
          NODE

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/macos/latest.json
