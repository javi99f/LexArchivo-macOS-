name: Publicar macOS

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
      - name: Comprobar TypeScript
        run: pnpm run check
      - name: Pruebas frontend
        run: pnpm test
      - name: Pruebas Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Construir macOS universal
        run: pnpm exec tauri build --target universal-apple-darwin --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Crear latest.json
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const releaseUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${process.env.GITHUB_REF_NAME}`;
          const bundleDir = "src-tauri/target/universal-apple-darwin/release/bundle/dmg";
          const files = fs.readdirSync(bundleDir);
          const dmg = files.find((name) => name.endsWith(".dmg"));
          if (!dmg) throw new Error("No se encontro el instalador .dmg");

          const sig = `${dmg}.sig`;
          if (!fs.existsSync(path.join(bundleDir, sig))) throw new Error("No se encontro la firma del .dmg");

          const mac = {
            signature: fs.readFileSync(path.join(bundleDir, sig), "utf8").trim(),
            url: `${releaseUrl}/${dmg}`
          };

          const latest = {
            version,
            notes: `LexArchivo macOS ${version}`,
            pub_date: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
            platforms: {
              "darwin-x86_64": mac,
              "darwin-aarch64": mac
            }
          };

          fs.writeFileSync(path.join(bundleDir, "latest.json"), JSON.stringify(latest, null, 2));
          NODE
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.sig
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/latest.json
